name: dbt CI - Sirene Nantes

on:
  push:
    branches: [main]
    paths:
      - 'models/**'
      - 'macros/**'
      - 'tests/**'
      - 'packages.yml'
      - 'dbt_project.yml'
  schedule:
    - cron: '0 5 * * *'    # 7h Paris heure d'été / 6h heure d'hiver
  workflow_dispatch:        # déclenchement manuel depuis l'onglet Actions

env:
  DBT_PROFILES_DIR: /home/runner/.dbt
  DBT_PACKAGES_INSTALL_PATH: ./dbt_packages

jobs:
  dbt-pipeline:
    name: dbt run + test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── 1. Récupérer le code ───────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python 3.11 avec cache pip ─────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Installer dbt-snowflake + Elementary CLI ──────────────────
      - name: Install Python dependencies
        run: pip install "dbt-snowflake>=1.8,<1.9" "elementary-data>=0.23.0,<0.24.0"

      # ── 4. Générer profiles.yml depuis les secrets ────────────────────
      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'PROFILE'
          sirene_nantes:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                role: SYSADMIN
                warehouse: ALAN_WH
                database: ALAN_DW
                schema: DBT_CI
                threads: 4
                client_session_keep_alive: false
          elementary:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                role: SYSADMIN
                warehouse: ALAN_WH
                database: ALAN_DW
                schema: DBT_CI_ELEMENTARY
                threads: 4
                client_session_keep_alive: false
          PROFILE

      # ── 5. Installer les packages dbt ─────────────────────────────────
      - name: dbt deps
        run: dbt deps

      # ── 6. Vérifier la connexion ──────────────────────────────────────
      - name: dbt debug
        run: dbt debug --target ci

      # ── 7. Exécuter les modèles ───────────────────────────────────────
      - name: dbt run
        run: dbt run --target ci

      # ── 8. Lancer les tests ───────────────────────────────────────────
      - name: dbt test
        run: dbt test --target ci

      # ── 9. Générer la documentation ───────────────────────────────────
      - name: dbt docs generate
        run: dbt docs generate --target ci

      # ── 10. Générer le rapport Elementary ────────────────────────────
      - name: Generate Elementary report
        run: |
          edr report \
            --profiles-dir ~/.dbt \
            --project-dir . \
            --profile-target ci
        continue-on-error: true   # ne bloque pas le pipeline si Elementary échoue

      # ── 11. Upload rapport Elementary ────────────────────────────────
      - name: Upload Elementary report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elementary-report-${{ github.run_number }}
          path: edr_target/elementary_report.html
          retention-days: 30

      # ── 12. Upload artefact docs ──────────────────────────────────────
      - name: Upload dbt docs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs-${{ github.run_number }}
          path: target/
          retention-days: 14

      # ── 13. Alerte email sur échec ────────────────────────────────────
      - name: Notify failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}
          from: ${{ secrets.EMAIL_USER }}
          subject: "[sirene-nantes] Pipeline dbt échoué - run #${{ github.run_number }}"
          to: alanandre19@gmail.com
          body: |
            Le pipeline dbt a échoué.

            Branche      : ${{ github.ref_name }}
            Commit       : ${{ github.sha }}
            Déclencheur  : ${{ github.event_name }}

            Voir les logs :
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
